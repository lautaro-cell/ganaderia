syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "GestorGanadero.Grpc.V1";

package livestock.v1;

service LivestockService {
  // --- AUTH & PROFILE ---
  rpc GetMyProfile (google.protobuf.Empty) returns (UserProfile);
  rpc GetAvailableTenants (google.protobuf.Empty) returns (TenantList);

  // --- FASE 2: MOTOR OPERATIVO Y CONTABLE ---
  rpc GetEventTemplates (GetTemplatesRequest) returns (EventTemplateList);
  rpc RegisterEvent (RegisterEventRequest) returns (ActionResponse);
  rpc UpdateEvent (UpdateEventRequest) returns (ActionResponse);
  rpc DeleteEvent (DeleteEventRequest) returns (ActionResponse);
  rpc GetEvents (GetEventsRequest) returns (EventList);
  rpc GetEventDetails (GetEventDetailsRequest) returns (EventDetail);
  rpc GetLedger (LedgerFilter) returns (stream LedgerEntry);
  rpc GetPendingSyncEvents (PendingSyncFilter) returns (PendingSyncList);
  rpc SyncToERP (SyncRequest) returns (SyncResult);

  // --- REPORTS ---
  rpc GetBalance (GetBalanceRequest) returns (BalanceReport);

  // --- FASE 3: INFRAESTRUCTURA ESPACIAL (GIS) ---
  rpc SaveLoteGeometria (LoteGeoRequest) returns (ActionResponse);

  // --- CRUD: Fields, Activities, Categories, Lots ---
  rpc GetFields (GetCatalogRequest) returns (FieldList);
  rpc CreateField (FieldMessage) returns (ActionResponse);
  rpc UpdateField (FieldMessage) returns (ActionResponse);
  rpc DeleteField (DeleteEntityRequest) returns (ActionResponse);

  rpc GetActivities (GetCatalogRequest) returns (ActivityList);
  rpc CreateActivity (ActivityMessage) returns (ActionResponse);
  rpc UpdateActivity (ActivityMessage) returns (ActionResponse);
  rpc DeleteActivity (DeleteEntityRequest) returns (ActionResponse);

  rpc GetAnimalCategories (GetCatalogRequest) returns (AnimalCategoryList);
  rpc CreateAnimalCategory (AnimalCategoryMessage) returns (ActionResponse);
  rpc UpdateAnimalCategory (AnimalCategoryMessage) returns (ActionResponse);
  rpc DeleteAnimalCategory (DeleteEntityRequest) returns (ActionResponse);

  rpc GetLotes (GetLotesRequest) returns (LoteList);
  rpc CreateLote (LoteMessage) returns (ActionResponse);
  rpc UpdateLote (LoteMessage) returns (ActionResponse);
  rpc DeleteLote (DeleteEntityRequest) returns (ActionResponse);

  // --- ADMIN: User Management ---
  rpc GetUsers (google.protobuf.Empty) returns (UserList);
  rpc InviteUser (InviteUserRequest) returns (ActionResponse);
  rpc UpdateUser (UserMessage) returns (ActionResponse);
  rpc DeleteUser (DeleteEntityRequest) returns (ActionResponse);
}

// =====================================================
// AUTH & PROFILE
// =====================================================
message UserProfile {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  string active_tenant_id = 5;
  string profile_image_url = 6;
}

message TenantMessage {
  string id = 1;
  string name = 2;
}

message TenantList { repeated TenantMessage tenants = 1; }

// =====================================================
// MENSAJES DE CONFIGURACIÓN DE EVENTOS
// =====================================================
message EventTemplate {
  string id = 1;
  string name = 2;
  string icon = 3;
  repeated string fields = 4;
  string color_code = 5;
}

message GetTemplatesRequest { string tenant_id = 1; }
message EventTemplateList { repeated EventTemplate templates = 1; }

// =====================================================
// MENSAJES DE OPERACIÓN
// =====================================================
message RegisterEventRequest {
  string template_id = 1;
  google.protobuf.Timestamp occurred_on = 2;
  string animal_id = 3;
  double primary_value = 4;
  map<string, string> dynamic_data = 5;
  string observations = 6;
  string field_id = 7;
  string activity_id = 8;
  string category_id = 9;
  string weight_per_head = 10;
  int32 head_count = 11;
  string category_destination_id = 12;
  string activity_destination_id = 13;
  string field_destination_id = 14;
}

message UpdateEventRequest {
  string id = 1;
  google.protobuf.Timestamp occurred_on = 2;
  int32 head_count = 3;
  string weight_per_head = 4;
  double primary_value = 5;
  string observations = 6;
}

message DeleteEventRequest { string id = 1; }

message GetEventDetailsRequest { string id = 1; }

message GetEventsRequest {
  string tenant_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message EventDetail {
  string id = 1;
  string type_name = 2;
  google.protobuf.Timestamp occurred_on = 3;
  string field_name = 4;
  int32 head_count = 5;
  string weight_per_head = 6;
  double total_weight = 7;
  string observations = 8;
  string type_code = 9;
}

message EventList { repeated EventDetail events = 1; }

// =====================================================
// MENSAJES DE CONSULTA (LIBRO MAYOR)
// =====================================================
message LedgerFilter {
  google.protobuf.Timestamp start_date = 1;
  google.protobuf.Timestamp end_date = 2;
  int32 page_index = 3;
  int32 page_size = 4;
  string search_term = 5;
  string tenant_id = 6;
}

message LedgerEntry {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string description = 3;
  double amount = 4;
  string account_code = 5;
  string status = 6;
  string entry_type = 7;
  int32 head_count = 8;
  string weight_kg = 9;
}

// =====================================================
// REPORTS: BALANCE
// =====================================================
message GetBalanceRequest {
  string tenant_id = 1;
  google.protobuf.Timestamp date = 2;
  string field_id = 3;
  string category_view = 4; // "cliente" o "gestor"
}

message BalanceItem {
  string field_name = 1;
  string category_name = 2;
  int32 head_count = 3;
  double total_weight = 4;
  string activity_name = 5;
}

message BalanceReport {
  repeated BalanceItem items = 1;
  google.protobuf.Timestamp report_date = 2;
}

// =====================================================
// MENSAJES GIS
// =====================================================
message LoteGeoRequest {
  string lote_id = 1;
  string geojson_polygon = 2;
}

// =====================================================
// ENTITY MANAGEMENT: Fields, Activities, Categories, Lots
// =====================================================
message GetCatalogRequest { string tenant_id = 1; }

message FieldMessage {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  string tenant_id = 5;
}

message ActivityMessage {
  string id = 1;
  string name = 2;
  bool is_global = 3;
  string tenant_id = 4;
}

message AnimalCategoryMessage {
  string id = 1;
  string name = 2;
  string activity_id = 3;
  string standard_weight_kg = 4;
  string category_type = 5;
  string external_id = 6;
  bool is_active = 7;
  string tenant_id = 8;
}

message LoteMessage {
  string id = 1;
  string name = 2;
  string field_id = 3;
  repeated string activity_ids = 4;
  string field_name = 5;
}

message FieldList          { repeated FieldMessage fields = 1; }
message ActivityList       { repeated ActivityMessage activities = 1; }
message AnimalCategoryList { repeated AnimalCategoryMessage categories = 1; }
message LoteList           { repeated LoteMessage lotes = 1; }

message GetLotesRequest { string field_id = 1; string tenant_id = 2; }

message DeleteEntityRequest { string id = 1; string tenant_id = 2; }

// =====================================================
// ADMIN: User Management
// =====================================================
message InviteUserRequest {
  string email = 1;
  string name = 2;
  string role_name = 3;
  string tenant_id = 4;
}

message UserMessage {
  string id = 1;
  string email = 2;
  string name = 3;
  string role_name = 4;
  bool is_active = 5;
  string tenant_id = 6;
}

message UserList { repeated UserMessage users = 1; }

// =====================================================
// RESPUESTAS COMUNES
// =====================================================
message ActionResponse {
  bool success = 1;
  string message = 2;
  string object_id = 3;
}

message PendingSyncFilter { string tenant_id = 1; }
message PendingSyncList   { repeated LedgerEntry entries = 1; }
message SyncRequest       { repeated string entry_ids = 1; }
message SyncResult        { int32 count = 1; string log = 2; }
