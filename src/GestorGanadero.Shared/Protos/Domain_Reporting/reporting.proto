syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "Protos/Common/shared_types.proto";

option csharp_namespace = "GestorGanadero.Services.Reporting.Contracts";
package reporting.v1;

service ReportingService {
  rpc GetLedger (LedgerFilter) returns (stream LedgerEntry);
  rpc GetBalance (GetBalanceRequest) returns (BalanceReport);
}

message LedgerFilter {
  google.protobuf.Timestamp start_date = 1;
  google.protobuf.Timestamp end_date = 2;
  int32 page_index = 3;
  int32 page_size = 4;
  string search_term = 5;
  string tenant_id = 6;
  string account_code = 7;
  string category_id = 8;
  string field_id = 9;
}

message LedgerEntry {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string description = 3;
  double amount = 4;
  string account_code = 5;
  string status = 6;
  string entry_type = 7;
  int32 head_count = 8;
  string weight_kg = 9;
  string livestock_event_id = 10;
  string field_name = 11;
  string category_name = 12;
  double debit_amount = 13;
  double credit_amount = 14;
}

message GetBalanceRequest {
  string tenant_id = 1;
  google.protobuf.Timestamp date = 2;       // fecha de corte (end)
  string field_id = 3;
  string category_view = 4;                 // "cliente" o "gestor"
  string category_id = 5;
  google.protobuf.Timestamp start_date = 6; // inicio del período
}

message BalanceItem {
  string field_name = 1;
  string category_name = 2;
  int32 head_count = 3;
  double total_weight = 4;
  string activity_name = 5;
  string account_code = 6;
  double debit_total = 7;
  double credit_total = 8;
  double net_balance = 9;
  string account_group = 10;        // "ACTIVO" | "PASIVO" | "RESULTADO"
  double weight_kg_movement = 11;   // KG bruto (suma sin signo)
}

message BalanceReport {
  repeated BalanceItem items = 1;
  google.protobuf.Timestamp report_date = 2;
}
