syntax = "proto3";
import "Protos/Common/shared_types.proto";

option csharp_namespace = "GestorGanadero.Services.Catalog.Contracts";
package catalog.v1;

service CatalogService {
  rpc GetFields (GetCatalogRequest) returns (FieldList);
  rpc CreateField (FieldMessage) returns (common.v1.ActionResponse);
  rpc UpdateField (FieldMessage) returns (common.v1.ActionResponse);
  rpc DeleteField (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetActivities (GetCatalogRequest) returns (ActivityList);
  rpc CreateActivity (ActivityMessage) returns (common.v1.ActionResponse);
  rpc UpdateActivity (ActivityMessage) returns (common.v1.ActionResponse);
  rpc DeleteActivity (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetAnimalCategories (GetCatalogRequest) returns (AnimalCategoryList);
  rpc CreateAnimalCategory (AnimalCategoryMessage) returns (common.v1.ActionResponse);
  rpc UpdateAnimalCategory (AnimalCategoryMessage) returns (common.v1.ActionResponse);
  rpc DeleteAnimalCategory (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetCategoryMappings (GetCatalogRequest) returns (CategoryMappingList);
  rpc AddCategoryMapping (CategoryMappingMessage) returns (common.v1.ActionResponse);
  rpc DeleteCategoryMapping (DeleteCategoryMappingRequest) returns (common.v1.ActionResponse);

  rpc GetEventTypes (GetCatalogRequest) returns (EventTypeList);
  rpc CreateEventType (EventTypeMessage) returns (common.v1.ActionResponse);
  rpc UpdateEventType (EventTypeMessage) returns (common.v1.ActionResponse);
  rpc DeleteEventType (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetAccounts (GetCatalogRequest) returns (AccountList);
  rpc CreateAccount (AccountMessage) returns (common.v1.ActionResponse);
  rpc UpdateAccount (AccountMessage) returns (common.v1.ActionResponse);
  rpc DeleteAccount (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetPlanes (GetCatalogRequest) returns (PlanCuentaList);
  rpc CreatePlan (PlanCuentaMessage) returns (common.v1.ActionResponse);
  rpc UpdatePlan (PlanCuentaMessage) returns (common.v1.ActionResponse);
  rpc DeletePlan (common.v1.DeleteEntityRequest) returns (common.v1.ActionResponse);

  rpc GetErpConcepts (GetCatalogRequest) returns (ErpConceptList);

  // Tarea 2.3: cuentas del ERP para selector en configuración contable
  rpc GetErpAccounts (GetCatalogRequest) returns (ErpAccountList);
}

message GetCatalogRequest { string tenant_id = 1; }

message ErpConceptMessage {
  string id = 1;
  string description = 2;
  double stock = 3;
  string unit_a = 4;
  string unit_b = 5;
  string grupo = 6;
  string subgrupo = 7;
  string external_id = 8;
}

message ErpConceptList { repeated ErpConceptMessage concepts = 1; }

message FieldMessage {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  string tenant_id = 5;
  string legal_name = 6;
  double area_hectares = 7;
  double gps_latitude = 8;
  double gps_longitude = 9;
  repeated string activity_ids = 10;
}

message ActivityMessage {
  string id = 1;
  string name = 2;
  bool is_global = 3;
  string tenant_id = 4;
  string description = 5;
  repeated string category_ids = 6;
  repeated string event_type_ids = 7;
}

message AnimalCategoryMessage {
  string id = 1;
  string name = 2;
  string activity_id = 3;
  string standard_weight_kg = 4;
  string category_type = 5;
  string external_id = 6;
  bool is_active = 7;
  string tenant_id = 8;
}

message CategoryMappingMessage {
  string categoria_cliente_id = 1;
  string categoria_gestor_id = 2;
  string categoria_cliente_nombre = 3;
  string categoria_gestor_nombre = 4;
  string tenant_id = 5;
}

message DeleteCategoryMappingRequest {
  string categoria_cliente_id = 1;
  string tenant_id = 2;
}

message EventTypeMessage {
  string id = 1;
  string code = 2;
  string name = 3;
  string debit_account_code = 4;
  string credit_account_code = 5;
  bool requires_origin_destination = 6;
  bool requires_destination_field = 7;
  bool is_active = 8;
  string tenant_id = 9;
  repeated string activity_ids = 10;
}

message PlanCuentaMessage {
  string id = 1;
  string code = 2;
  string name = 3;
  string tenant_id = 4;
}

message AccountMessage {
  string id = 1;
  string code = 2;
  string name = 3;
  string plan_id = 4;
  string plan_name = 5;
  string normal_type = 6;
  bool is_active = 7;
  string tenant_id = 8;
}

message ErpAccountMessage {
  string code = 1;
  string name = 2;
  string type = 3;
}

message ErpAccountList { repeated ErpAccountMessage accounts = 1; }

message FieldList          { repeated FieldMessage fields = 1; }
message ActivityList       { repeated ActivityMessage activities = 1; }
message AnimalCategoryList { repeated AnimalCategoryMessage categories = 1; }
message CategoryMappingList { repeated CategoryMappingMessage mappings = 1; }
message EventTypeList { repeated EventTypeMessage event_types = 1; }
message AccountList { repeated AccountMessage accounts = 1; }
message PlanCuentaList { repeated PlanCuentaMessage planes = 1; }
